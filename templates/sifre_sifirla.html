{% extends "base.html" %}
{% block title %}Şifre Belirle — {{ SITE_ADI }}{% endblock %}

{% block content %}
<section class="block alt">
  <div class="container">
    <div class="form-card form-narrow">
      <h1 style="font-size:24px;text-align:center;margin-bottom:6px;">Yeni Şifre Belirle</h1>
      <p class="muted center" style="margin-bottom:24px;font-size:14.5px;">
        Hesabınız için yeni bir şifre oluşturun (en az 6 karakter).
      </p>
      <form method="POST" action="{{ url_for('sifre_sifirla', token=token) }}">
        <div class="field">
          <label for="sifre">Yeni Şifre</label>
          <input type="password" name="sifre" id="sifre" required minlength="6" autofocus>
        </div>
        <div class="field">
          <label for="sifre2">Yeni Şifre (Tekrar)</label>
          <input type="password" name="sifre2" id="sifre2" required minlength="6">
        </div>
        <button type="submit" class="btn btn-gold btn-block btn-lg">Şifreyi Güncelle →</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
