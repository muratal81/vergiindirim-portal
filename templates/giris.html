{% extends "base.html" %}
{% block title %}Giriş Yap — {{ SITE_ADI }}{% endblock %}

{% block content %}
<section class="block alt">
  <div class="container">
    <div class="form-card form-narrow">
      <h1 style="font-size:26px;text-align:center;margin-bottom:6px;">Üye Girişi</h1>
      <p class="muted center" style="margin-bottom:26px;font-size:14.5px;">Programları indirmek için giriş yapın.</p>
      <form method="POST" action="{{ url_for('giris') }}">
        <div class="field">
          <label for="email">E-posta Adresiniz</label>
          <input type="email" name="email" id="email" required autofocus>
        </div>
        <div class="field">
          <label for="sifre">Şifreniz</label>
          <input type="password" name="sifre" id="sifre" required>
        </div>
        <button type="submit" class="btn btn-gold btn-block btn-lg">Giriş Yap →</button>
      </form>
      <p class="center" style="margin-top:14px;font-size:14px;">
        <a href="{{ url_for('sifremi_unuttum') }}">Şifremi unuttum</a>
      </p>
      <p class="muted center" style="margin-top:6px;font-size:14px;">
        Henüz üye değil misiniz? <a href="{{ url_for('kayit') }}"><strong>Ücretsiz üye olun</strong></a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
