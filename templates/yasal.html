{% extends "base.html" %}
{% block title %}{{ baslik }} — {{ SITE_ADI }}{% endblock %}

{% block content %}
<div class="page-head">
  <div class="container">
    <div class="breadcrumb"><a href="{{ url_for('index') }}">Anasayfa</a> / {{ baslik }}</div>
    <h1>{{ baslik }}</h1>
  </div>
</div>

<section class="block">
  <div class="container">
    <div style="max-width:820px;margin:0 auto;" class="legal-body">
      {{ govde | safe }}
      <p class="muted" style="margin-top:36px;font-size:13px;border-top:1px solid var(--slate-200);padding-top:16px;">
        Son güncelleme: {{ YIL }} · {{ SITE_SAHIBI }} · {{ SITE_DOMAIN }}
      </p>
    </div>
  </div>
</section>

<style>
  .legal-body h2 { font-size:19px; margin:26px 0 10px; color:var(--navy-800); }
  .legal-body p { color:var(--slate-700); margin-bottom:12px; line-height:1.75; }
  .legal-body ul { margin:0 0 14px 22px; color:var(--slate-700); }
  .legal-body li { margin-bottom:7px; }
</style>
{% endblock %}
