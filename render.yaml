# Render.com blueprint
services:
  - type: web
    name: vergiindirim
    runtime: python
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --timeout 90
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: vergiindirim-db
          property: connectionString
      - key: FLASK_SECRET
        generateValue: true
      - key: RENDER
        value: "true"

databases:
  - name: vergiindirim-db
    plan: free
